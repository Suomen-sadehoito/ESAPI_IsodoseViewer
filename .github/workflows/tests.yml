name: Build & Test

on:
  push:
    branches: [ master, main, develop, feature/** ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Job 1: core build + unit tests (Debug + Release matrix)
  # ──────────────────────────────────────────────────────────────────────
  build-and-test:
    name: ${{ matrix.configuration }} / ${{ matrix.platform }}
    runs-on: windows-latest
    env:
      CI: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - configuration: Debug
            platform: Any CPU
            run_tests: true
            upload_coverage: true
          - configuration: Release
            platform: x64
            run_tests: true
            upload_coverage: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: nuget restore EQD2Viewer.sln

      - name: Build solution (${{ matrix.configuration }} / ${{ matrix.platform }})
        run: |
          msbuild EQD2Viewer.sln `
            /p:Configuration="${{ matrix.configuration }}" `
            /p:Platform="${{ matrix.platform }}" `
            /t:Build `
            /verbosity:minimal `
            /fl `
            /flp:"logfile=build.log;verbosity=normal;encoding=UTF-8" `
            /nologo

      - name: Summarize warnings
        if: always()
        shell: pwsh
        run: |
          if (Test-Path build.log) {
            $warnings = Select-String -Path build.log -Pattern '\bwarning\s+[A-Z]{2}[0-9]+' -AllMatches
            $count = ($warnings | Measure-Object).Count
            "### Build warnings (${{ matrix.configuration }}): $count" | Out-File -Append $env:GITHUB_STEP_SUMMARY
            if ($count -gt 0) {
              "" | Out-File -Append $env:GITHUB_STEP_SUMMARY
              '```' | Out-File -Append $env:GITHUB_STEP_SUMMARY
              $warnings | ForEach-Object { $_.Line } | Select-Object -First 30 | Out-File -Append $env:GITHUB_STEP_SUMMARY
              '```' | Out-File -Append $env:GITHUB_STEP_SUMMARY
            }
          }

      - name: Run unit + integration + smoke tests
        if: matrix.run_tests
        run: |
          dotnet test EQD2Viewer.Tests\EQD2Viewer.Tests.csproj `
            --no-build `
            --configuration ${{ matrix.configuration }} `
            --logger "trx;LogFileName=test-results.trx" `
            --logger "console;verbosity=normal" `
            --results-directory TestResults `
            --collect:"XPlat Code Coverage" `
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always() && matrix.run_tests
        with:
          name: Tests (${{ matrix.configuration }})
          path: TestResults/*.trx
          reporter: dotnet-trx

      - name: Upload coverage artifact
        if: matrix.upload_coverage && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.configuration }}
          path: TestResults/**/coverage.cobertura.xml
          retention-days: 14

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.configuration }}
          path: build.log
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────
  # Job 2: aggregate coverage report (from Debug run)
  # ──────────────────────────────────────────────────────────────────────
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-Debug
          path: coverage
        continue-on-error: true

      - name: Generate coverage summary
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/**/coverage.cobertura.xml
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '60 80'
        continue-on-error: true

      - name: Add coverage to summary
        if: always()
        shell: bash
        run: |
          if [ -f code-coverage-results.md ]; then
            echo "## Code coverage" >> $GITHUB_STEP_SUMMARY
            cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY
          fi
