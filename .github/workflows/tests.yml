name: Unit Tests

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    # Use the CI solution filter — excludes FixtureGenerator which requires real ESAPI DLLs.
    # The full .sln includes all projects and is used on Eclipse workstations.
    - name: Restore NuGet packages
      run: nuget restore ESAPI_EQD2Viewer.CI.slnf

    - name: Build solution (CI filter — excludes FixtureGenerator)
      run: msbuild ESAPI_EQD2Viewer.CI.slnf /p:Configuration=Debug /p:Platform="Any CPU" /t:Build /verbosity:minimal

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # Run all tests including integration tests.
    # Integration tests auto-discover fixtures in TestFixtures/ — 
    # the sample_standard_2gy fixture is always present in the repo.
    # Eclipse-generated fixtures are included when committed.
    - name: Run unit tests and integration tests
      run: |
        dotnet test ESAPI_EQD2Viewer.Tests\ESAPI_EQD2Viewer.Tests.csproj --no-build --configuration Debug --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results (Unit + Integration)
        path: TestResults/*.trx
        reporter: dotnet-trx